<!DOCTYPE html>
<html>
    <head>
        <title>Simple AR Box Marker Less</title>


        <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>


        <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe/buil/aframe-ar.js"></script>


    </head>


    <body>

<a-scene
  embedded arjs="sourceType: webcam; facingMode; user; debugUIEnable: false;">
<a-markeer type="pattern" src="pattern-Sung Jinwoo - Solo Leveling.patt">
<a-box
position="0 0-2"
rotation="0 45 0"
color="blue"
scale="0.4 0.4 0.4"
></a-box>

</a-markeer>

</a-scene>
    </body>
</html>
